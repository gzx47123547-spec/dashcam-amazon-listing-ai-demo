<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>车载记录仪 Amazon Listing AI 优化助手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --text: #172033;
        --muted: #64748b;
        --border: #d8e0ec;
        --primary: #1565c0;
        --primary-dark: #0d47a1;
        --accent: #0f766e;
        --danger: #b42318;
        --danger-bg: #fff1f0;
        --shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
        font-weight: 650;
        padding: 0 16px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .primary-button {
        background: var(--primary);
        border-color: var(--primary);
        color: #ffffff;
      }

      .primary-button:hover:not(:disabled) {
        background: var(--primary-dark);
        border-color: var(--primary-dark);
      }

      .page-shell {
        width: min(1480px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 750;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 980px;
        margin-bottom: 12px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.08;
      }

      .subtitle {
        max-width: 1080px;
        margin-bottom: 24px;
        color: var(--muted);
        font-size: 1.04rem;
        line-height: 1.75;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 0.95fr) minmax(420px, 1.05fr);
        gap: 20px;
        align-items: start;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .panel-heading,
      .result-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .panel-heading h2,
      .result-toolbar h2 {
        margin-bottom: 4px;
        font-size: 1.18rem;
      }

      .panel-heading p,
      .result-toolbar p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .field-grid {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field span {
        color: #334155;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--text);
        outline: none;
        padding: 11px 12px;
        line-height: 1.55;
      }

      .field textarea {
        min-height: 98px;
        resize: vertical;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .result-panel {
        position: sticky;
        top: 20px;
      }

      .result-toolbar {
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      .status-group {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        flex: 0 0 12px;
        border-radius: 999px;
        background: #94a3b8;
        box-shadow: 0 0 0 5px rgba(148, 163, 184, 0.16);
      }

      .status-dot.running {
        background: #ca8a04;
      }

      .status-dot.success {
        background: #16803c;
      }

      .status-dot.error {
        background: var(--danger);
      }

      .error-box {
        margin: 18px 0;
        border: 1px solid #ffc9c2;
        border-radius: 8px;
        background: var(--danger-bg);
        color: var(--danger);
        padding: 14px;
      }

      .error-box pre {
        overflow-x: auto;
        white-space: pre-wrap;
        margin: 8px 0 0;
        color: #7a271a;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.86rem;
        line-height: 1.55;
      }

      .markdown-body {
        min-height: 640px;
        max-height: calc(100vh - 250px);
        overflow: auto;
        overflow-wrap: anywhere;
        padding: 20px 4px 4px;
        color: #253047;
        line-height: 1.72;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        margin: 1.2em 0 0.55em;
        line-height: 1.28;
      }

      .markdown-body ul,
      .markdown-body ol {
        padding-left: 1.35rem;
      }

      .markdown-body code {
        border-radius: 6px;
        background: #edf2f7;
        padding: 0.16em 0.36em;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.88em;
      }

      .markdown-body strong {
        font-weight: 800;
      }

      .markdown-body em {
        font-style: italic;
      }

      .markdown-body pre {
        overflow-x: auto;
        white-space: pre-wrap;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        padding: 14px;
      }

      .empty-state {
        display: grid;
        min-height: 420px;
        place-items: center;
        border: 1px dashed #c7d2e0;
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--muted);
        padding: 24px;
        text-align: center;
      }

      @media (max-width: 1080px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .result-panel {
          position: static;
        }

        .markdown-body {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header>
        <p class="eyebrow">DashCam Amazon Listing AI Workflow Demo</p>
        <h1>车载记录仪 Amazon Listing AI 优化助手</h1>
        <p class="subtitle">
          输入产品参数、核心功能、关键词、竞品 Listing 和用户评论痛点，系统会调用 Dify 工作流，自动生成 Listing 初稿，并进行关键词覆盖和合规风险检查，最终输出一版可供运营参考的 Amazon Listing。
        </p>
      </header>

      <section class="workspace">
        <form class="panel" id="demo-form">
          <div class="panel-heading">
            <div>
              <h2>产品输入</h2>
              <p>已预填一组测试数据，可直接运行。</p>
            </div>
          </div>
          <div class="field-grid" id="fields"></div>
          <div class="button-row">
            <button class="primary-button" id="submit-button" type="submit">生成 Listing</button>
            <button id="reset-button" type="button">恢复测试数据</button>
            <button id="clear-button" type="button">清空结果</button>
          </div>
        </form>

        <section class="panel result-panel">
          <div class="result-toolbar">
            <div class="status-group">
              <span class="status-dot" id="status-dot"></span>
              <div>
                <h2>输出结果</h2>
                <p id="status-line">运行状态：待运行 · 运行耗时：--</p>
              </div>
            </div>
            <button id="copy-button" type="button" disabled>复制结果</button>
          </div>
          <div id="error-box"></div>
          <div class="markdown-body" id="result">
            <div class="empty-state">点击“生成 Listing”后，这里会展示 Dify 返回的 Markdown 结果。</div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const defaultValues = {
        product_name: "4K 前后双录车载记录仪",
        marketplace: "Amazon US / 美国站",
        product_specs:
          "前摄支持 4K 录制，后摄支持 1080P 录制，3 英寸 IPS 屏幕，前摄 170° 广角，后摄 140° 视角，支持循环录制、G-Sensor 碰撞锁定、夜视、停车监控，最大支持 256GB microSD 卡。内存卡不包含在包装内。停车监控可能需要额外降压线，降压线不包含。",
        core_features:
          "4K 高清前摄、1080P 后摄、前后双录、夜视、循环录制、G-Sensor 碰撞锁定、停车监控、3 英寸屏幕、广角录制、安装便捷。",
        target_audience:
          "日常通勤车主、新手司机、网约车司机、家庭用车用户、自驾出行用户。",
        core_keywords:
          "dash cam, 4K dash cam, front and rear dash cam, dash camera for cars, night vision dash cam, loop recording dash cam, G-sensor dash cam, parking monitor dash cam",
        competitor_listing:
          "Competitor Title: 4K Dash Cam Front and Rear, Dashboard Camera for Cars with Night Vision, Loop Recording, G-Sensor, Parking Monitor, 3 Inch Screen\n\nCompetitor Bullet Points:\n\n1. Records front and rear road conditions with clear video quality.\n2. Night vision helps capture driving footage in low-light environments.\n3. Loop recording automatically overwrites old unlocked files when the card is full.\n4. Built-in G-Sensor locks important footage when sudden impact is detected.\n5. Parking monitor helps record unexpected events when the vehicle is parked.",
        review_pain_points:
          "部分用户反馈夜间画面不够清晰，后摄像头布线比较麻烦，停车监控需要额外配件但页面说明不够清楚，内存卡不包含容易产生误解，安装说明不够直观。",
        brand_tone: "专业、可靠、简洁、实用、有科技感。"
      };

      const fieldDefs = [
        ["product_name", "产品名称", "input", 1],
        ["marketplace", "目标站点", "input", 1],
        ["product_specs", "产品参数", "textarea", 5],
        ["core_features", "核心功能", "textarea", 4],
        ["target_audience", "目标用户", "textarea", 3],
        ["core_keywords", "核心关键词", "textarea", 4],
        ["competitor_listing", "竞品 Listing", "textarea", 8],
        ["review_pain_points", "用户评论痛点", "textarea", 4],
        ["brand_tone", "品牌语气", "textarea", 3]
      ];

      const fieldsContainer = document.querySelector("#fields");
      const form = document.querySelector("#demo-form");
      const submitButton = document.querySelector("#submit-button");
      const resetButton = document.querySelector("#reset-button");
      const clearButton = document.querySelector("#clear-button");
      const copyButton = document.querySelector("#copy-button");
      const result = document.querySelector("#result");
      const errorBox = document.querySelector("#error-box");
      const statusLine = document.querySelector("#status-line");
      const statusDot = document.querySelector("#status-dot");
      let currentResult = "";

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderInlineMarkdown(value) {
        const codePlaceholders = [];
        let html = escapeHtml(value);

        html = html.replace(/`([^`]+)`/g, (_, code) => {
          const placeholder = `@@CODE_${codePlaceholders.length}@@`;
          codePlaceholders.push(`<code>${code}</code>`);
          return placeholder;
        });

        html = html
          .replace(/\*\*([\s\S]+?)\*\*/g, "<strong>$1</strong>")
          .replace(/__([\s\S]+?)__/g, "<strong>$1</strong>")
          .replace(/(^|[^*])\*([^*\n]+?)\*/g, "$1<em>$2</em>")
          .replace(/(^|[^_])_([^_\n]+?)_/g, "$1<em>$2</em>");

        for (const [index, code] of codePlaceholders.entries()) {
          html = html.replace(`@@CODE_${index}@@`, code);
        }

        return html;
      }

      function renderMarkdown(markdown) {
        const lines = String(markdown).split("\n");
        let html = "";
        let inList = false;
        let inCode = false;

        for (const line of lines) {
          if (line.trim().startsWith("```")) {
            html += inCode ? "</code></pre>" : "<pre><code>";
            inCode = !inCode;
            continue;
          }

          if (inCode) {
            html += `${escapeHtml(line)}\n`;
            continue;
          }

          if (/^###\s+/.test(line)) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<h3>${renderInlineMarkdown(line.replace(/^###\s+/, ""))}</h3>`;
          } else if (/^##\s+/.test(line)) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<h2>${renderInlineMarkdown(line.replace(/^##\s+/, ""))}</h2>`;
          } else if (/^#\s+/.test(line)) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<h1>${renderInlineMarkdown(line.replace(/^#\s+/, ""))}</h1>`;
          } else if (/^[-*]\s+/.test(line)) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${renderInlineMarkdown(line.replace(/^[-*]\s+/, ""))}</li>`;
          } else if (/^\d+\.\s+/.test(line)) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${renderInlineMarkdown(line.replace(/^\d+\.\s+/, ""))}</li>`;
          } else if (line.trim()) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<p>${renderInlineMarkdown(line)}</p>`;
          }
        }

        if (inList) {
          html += "</ul>";
        }
        if (inCode) {
          html += "</code></pre>";
        }

        return html;
      }

      function setStatus(state, elapsed) {
        const labels = {
          idle: "待运行",
          running: "运行中",
          success: "已完成",
          error: "失败"
        };
        statusDot.className = `status-dot ${state}`;
        statusLine.textContent = `运行状态：${labels[state]} · 运行耗时：${elapsed || "--"}`;
      }

      function readForm() {
        return Object.fromEntries(
          fieldDefs.map(([key]) => [key, document.querySelector(`[name="${key}"]`).value])
        );
      }

      function fillForm(values) {
        for (const [key, value] of Object.entries(values)) {
          const field = document.querySelector(`[name="${key}"]`);
          if (field) {
            field.value = value;
          }
        }
      }

      function clearResult() {
        currentResult = "";
        errorBox.innerHTML = "";
        copyButton.disabled = true;
        copyButton.textContent = "复制结果";
        result.innerHTML =
          '<div class="empty-state">点击“生成 Listing”后，这里会展示 Dify 返回的 Markdown 结果。</div>';
        setStatus("idle");
      }

      fieldsContainer.innerHTML = fieldDefs
        .map(([key, label, type, rows]) => {
          const value = escapeHtml(defaultValues[key]);
          const control =
            type === "input"
              ? `<input name="${key}" value="${value}" />`
              : `<textarea name="${key}" rows="${rows}">${value}</textarea>`;
          return `<label class="field"><span>${label}</span>${control}</label>`;
        })
        .join("");

      resetButton.addEventListener("click", () => {
        fillForm(defaultValues);
        errorBox.innerHTML = "";
      });

      clearButton.addEventListener("click", clearResult);

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(currentResult);
        copyButton.textContent = "已复制";
        window.setTimeout(() => {
          copyButton.textContent = "复制结果";
        }, 1800);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = "生成中...";
        errorBox.innerHTML = "";
        copyButton.disabled = true;
        result.innerHTML = '<div class="empty-state">Dify 工作流正在运行，请稍候...</div>';
        setStatus("running");
        const startedAt = performance.now();

        try {
          const response = await fetch("/api/dify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(readForm())
          });
          const payload = await response.json();
          const elapsedMs = payload.elapsedMs || Math.round(performance.now() - startedAt);
          const elapsed = elapsedMs < 1000 ? `${elapsedMs} ms` : `${(elapsedMs / 1000).toFixed(1)} s`;

          if (!response.ok) {
            const detail =
              typeof payload.detail === "string"
                ? payload.detail
                : payload.detail
                  ? JSON.stringify(payload.detail, null, 2)
                  : "";
            throw new Error([payload.error || "请求失败，请检查 Dify 配置。", detail].filter(Boolean).join("\n\n"));
          }

          currentResult = payload.result || JSON.stringify(payload, null, 2);
          result.innerHTML = renderMarkdown(currentResult);
          copyButton.disabled = false;
          setStatus("success", elapsed);
        } catch (error) {
          currentResult = "";
          const elapsedMs = Math.round(performance.now() - startedAt);
          const elapsed = elapsedMs < 1000 ? `${elapsedMs} ms` : `${(elapsedMs / 1000).toFixed(1)} s`;
          errorBox.innerHTML = `<div class="error-box"><strong>调用失败</strong><pre>${escapeHtml(error.message)}</pre></div>`;
          result.innerHTML = '<div class="empty-state">请检查 .env.local 中的 Dify API 配置后重试。</div>';
          setStatus("error", elapsed);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "生成 Listing";
        }
      });
    </script>
  </body>
</html>
